name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift ${{ matrix.swift }} on ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macOS,   runner: macos-latest,   swift: 'latest' }
          - { name: macOS,   runner: macos-latest,   swift: '6.3'    }
          - { name: macOS,   runner: macos-latest,   swift: '5'      }
          - { name: Linux,   runner: ubuntu-latest,  swift: 'latest' }
          - { name: Linux,   runner: ubuntu-latest,  swift: '6.3'    }
          - { name: Linux,   runner: ubuntu-latest,  swift: '6'      }
          - { name: Windows, runner: windows-latest, swift: 'latest' }
          - { name: Windows, runner: windows-latest, swift: '6.3'    }
          - { name: Windows, runner: windows-latest, swift: '6'      }
    steps:
      - uses: actions/checkout@v4
      - id: setup
        uses: ./
        with:
          swift-version: ${{ matrix.swift }}
      - name: Verify output
        shell: bash
        run: |
          set -e
          RESOLVED='${{ steps.setup.outputs.version }}'
          INPUT='${{ matrix.swift }}'
          echo "Input: $INPUT  Resolved: $RESOLVED"
          if [[ -z "$RESOLVED" ]]; then
            echo "::error::version output is empty"; exit 1
          fi
          if [[ "$RESOLVED" != "$INPUT"* ]]; then
            echo "::error::Resolved '$RESOLVED' doesn't match input '$INPUT'"; exit 1
          fi
      - name: Smoke test
        shell: bash
        run: |
          swift --version
          echo 'print("Hello from Swift ${{ steps.setup.outputs.version }}")' > hello.swift
          swift hello.swift
