name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os.name }}
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        swift: ['latest', '5', '6.3']
        os:
          - { name: macOS, runner: macos-latest }
          - { name: Linux, runner: ubuntu-24.04 }
          - { name: Windows, runner: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - id: setup
        uses: ./
        with:
          swift-version: ${{ matrix.swift }}
      - name: Verify output
        shell: bash
        run: |
          set -e
          RESOLVED='${{ steps.setup.outputs.version }}'
          INPUT='${{ matrix.swift }}'
          echo "Input: $INPUT  Resolved: $RESOLVED"
          if [[ -z "$RESOLVED" ]]; then
            echo "::error::version output is empty"; exit 1
          fi
          if [[ "$INPUT" != "latest" ]] && [[ "$RESOLVED" != "$INPUT"* ]]; then
            echo "::error::Resolved '$RESOLVED' doesn't match input '$INPUT'"; exit 1
          fi
      - name: Smoke test
        shell: bash
        run: |
          swift --version
          echo 'print("Hello from Swift ${{ steps.setup.outputs.version }}")' > hello.swift
          swift hello.swift
